name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Utilizing both platforms to guarantee absolute multi-platform compiler isolation
        os: [ubuntu-latest, macos-latest]

    steps:
      # Step 1: Checkout code using stable Node20 v4 architecture
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up official Swift 6 Core Toolchain
      - name: Setup Swift Environment
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: '6.0'

      # Step 3: Fetch structural external components
      - name: Resolve Dependencies
        run: swift package resolve

      # Step 4: Multi-Target Compilation (with explicit macOS 11 rules)
      - name: Build Package
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Enforce backward compatibility down to macOS 11 Big Sur on x86_64 hardware layouts
            swift build -c release --target HandwritingSimulator -Xswiftc -target -Xswiftc x86_64-apple-macos11
          else
            swift build -c release --target HandwritingSimulator
          fi

      # Step 5: Test Guard Isolation
      - name: Run Tests
        run: |
          if swift package describe | grep -q "Tests"; then
            if [ "${{ matrix.os }}" = "macos-latest" ]; then
              swift test --enable-code-coverage -Xswiftc -target -Xswiftc x86_64-apple-macos11
            else
              swift test --enable-code-coverage
            fi
          else
            echo "Bypassing test sequence: No discrete test suites mapped in Package.swift yet."
          fi

      # Step 6: Autopilot Artifact Extraction & Storage (Latest v7 Framework)
      - name: Upload Final Production Binary
        uses: actions/upload-artifact@v7
        with:
          name: HandwritingSimulator-Release-${{ matrix.os }}
          # Points directly to the compiled release directory where the package binary output lands
          path: .build/release/HandwritingSimulator
          # Using the new 2026 feature to bypass unneeded nesting compression
          archive: false
          if-no-files-found: error
