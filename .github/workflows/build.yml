name: Build and Package macOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest # Uses the standard, high-speed modern GitHub runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Compiles on modern macOS but explicitly targets the macOS 11 deployment SDK
    - name: Compile Swift Package for macOS 11 deployment
      run: |
        swift build -c release \
          --arch x86_64 \
          --arch arm64 \
          -Xswiftc -target -Xswiftc x86_64-apple-macosx11.0 \
          -Xswiftc -target -Xswiftc arm64-apple-macosx11.0

    # Assemble the AppKit bundle layout matching your Sources file hierarchy
    - name: Assemble macOS Bundle Structures
      run: |
        mkdir -p build_output/HandwritingSimulator.app/Contents/MacOS
        mkdir -p build_output/HandwritingSimulator.app/Contents/Resources
        
        # Copy the compiled universal binary out of the build directory
        cp .build/apple/Products/Release/HandwritingSimulator build_output/HandwritingSimulator.app/Contents/MacOS/
        
        # Inject the native metadata property list file
        cp Info.plist build_output/HandwritingSimulator.app/Contents/

    # Ad-hoc sign the app so it runs cleanly on local deployment targets
    - name: Ad-hoc Code Sign Application Bundle
      run: |
        codesign --force --deep --sign - build_output/HandwritingSimulator.app

    - name: Upload Compiled App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HandwritingSimulator-Mac-Beta-B1
        path: build_output/HandwritingSimulator.app
