name: Build and Package macOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest # Standard high-speed GitHub runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Run the exact native Swift Package Manager compilation toolchain
    - name: Compile via Swift Build
      run: |
        swift build -c release \
          --arch x86_64 \
          --arch arm64 \
          -Xswiftc -target -Xswiftc x86_64-apple-macosx11.0 \
          -Xswiftc -target -Xswiftc arm64-apple-macosx11.0

    # Stage the compiled machine binary directly from the native .build folder
    - name: Stage Compiled Executable Artifact
      run: |
        mkdir -p build_output
        cp .build/apple/Products/Release/HandwritingSimulator build_output/

    # Upload the pure, compiled machine binary executable directly
    - name: Upload Binary Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HandwritingSimulator-Mac-Beta-B1
        path: build_output/HandwritingSimulator
