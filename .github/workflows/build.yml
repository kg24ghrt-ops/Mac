# .github/workflows/build.yml
name: Build & Upload

on: [push]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build Release (macOS 11)
        run: swift build -c release -Xswiftc -target -Xswiftc x86_64-apple-macos11 -v

      - name: Package Binary
        run: |
          mkdir -p artifact
          cp .build/release/HandwritingSimulator artifact/
          cd artifact
          zip -r ../HandwritingSimulator.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandwritingSimulator
          path: HandwritingSimulator.zip
